<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Band of Agents - Hackathon Demo</title>
    <link rel="stylesheet" href="styles/main.css">
</head>
<body>
    <div class="stars"></div>
    
    <main class="container">
        <section class="header">
            <h1 class="title">A demo app for <span class="highlight">BAND OF AGENTS</span> hackathon</h1>
            <p class="subtitle">Intelligent agents working in harmony</p>
        </section>

        <section class="agents-container">
            <div class="agents-grid" id="agentsGrid"></div>
        </section>

        <section class="control-panel">
            <div class="control-group">
                <h2>System Controls</h2>
                <div class="button-group">
                    <button class="btn btn-primary" id="healthBtn">Check Health</button>
                    <button class="btn btn-secondary" id="logsBtn">View Logs</button>
                    <button class="btn btn-danger" id="injectErrorBtn">Inject Error</button>
                </div>
            </div>
        </section>

        <section class="status-panel" id="statusPanel" style="display: none;">
            <h3 id="statusTitle"></h3>
            <pre id="statusContent"></pre>
            <button class="btn btn-close" onclick="closeStatus()">Close</button>
        </section>
    </main>

    <!-- Agent Animation Canvas -->
    <svg class="agents-animation" id="animationCanvas"></svg>

    <script src="js/api.js"></script>
    <script src="js/agents.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
